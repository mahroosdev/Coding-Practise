<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Lists</title>
</head>

<body>

    <h1>HTML Lists</h1>

    <h2>Unordered List</h2>

    <ul>
        <li>Apple</li>
        <li>Banana</li>
        <li>Orange</li>
    </ul>

    <h2>Ordered List</h2>

    <ol>
        <li>Wake Up</li>
        <li>Have Breakfast</li>
        <li>Go to School</li>
    </ol>

</body>

</html>
