<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Table Rowspan and Colspan</title>
</head>

<body>

    <h1>HTML Table Rowspan and Colspan</h1>

    <h2>Example of Colspan</h2>

    <table border="1">

        <tr>
            <th colspan="2">Student Information</th>
        </tr>

        <tr>
            <th>Name</th>
            <th>Age</th>
        </tr>

        <tr>
            <td>John</td>
            <td>20</td>
        </tr>

    </table>

    <br>

    <h2>Example of Rowspan</h2>

    <table border="1">

        <tr>
            <th>Name</th>
            <th>Subject</th>
        </tr>

        <tr>
            <td rowspan="2">Sarah</td>
            <td>Mathematics</td>
        </tr>

        <tr>
            <td>Science</td>
        </tr>

    </table>

</body>

</html>
