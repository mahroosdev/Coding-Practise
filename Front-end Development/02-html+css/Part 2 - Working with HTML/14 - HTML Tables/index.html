<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tables</title>
</head>

<body>

    <h1>HTML Tables</h1>

    <table border="1">

        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Country</th>
        </tr>

        <tr>
            <td>John</td>
            <td>22</td>
            <td>USA</td>
        </tr>

        <tr>
            <td>Sarah</td>
            <td>24</td>
            <td>Canada</td>
        </tr>

        <tr>
            <td>Ali</td>
            <td>21</td>
            <td>UAE</td>
        </tr>

    </table>

</body>

</html>
