<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Contact page of my HTML portfolio website">

    <meta name="keywords" content="HTML, Contact, Portfolio">

    <meta name="author" content="Your Name">

    <title>My Portfolio | Contact</title>

    <link rel="icon" type="image/x-icon" href="favicon.ico">

</head>

<body>

    <!-- Header -->

    <header>

        <h1>Contact Me</h1>

        <p>
            Feel free to get in touch by filling out the form below.
        </p>

    </header>

    <hr>

    <!-- Navigation -->

    <nav>

        <a href="index.html">Home</a> |

        <a href="about.html">About</a> |

        <a href="services.html">Services</a> |

        <a href="gallery.html">Gallery</a> |

        <a href="contact.html">Contact</a>

    </nav>

    <hr>

    <main>

        <section>

            <h2>Contact Form</h2>

            <form action="#" method="post">

                <fieldset>

                    <legend>Personal Information</legend>

                    <p>

                        <label for="fullname">Full Name:</label>

                        <br>

                        <input
                            type="text"
                            id="fullname"
                            name="fullname"
                            placeholder="Enter your full name"
                            required>

                    </p>

                    <p>

                        <label for="email">Email Address:</label>

                        <br>

                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="Enter your email"
                            required>

                    </p>

                    <p>

                        <label for="password">Password:</label>

                        <br>

                        <input
                            type="password"
                            id="password"
                            name="password">

                    </p>

                    <p>

                        <label for="phone">Phone Number:</label>

                        <br>

                        <input
                            type="tel"
                            id="phone"
                            name="phone"
                            placeholder="+94 77 123 4567">

                    </p>

                    <p>

                        <label for="age">Age:</label>

                        <br>

                        <input
                            type="number"
                            id="age"
                            name="age"
                            min="1"
                            max="100">

                    </p>

                    <p>

                        <label for="birthdate">Date of Birth:</label>

                        <br>

                        <input
                            type="date"
                            id="birthdate"
                            name="birthdate">

                    </p>

                </fieldset>

                <br>

                <fieldset>

                    <legend>Additional Information</legend>

                    <p>

                        <label for="country">Country:</label>

                        <br>

                        <select
                            id="country"
                            name="country">

                            <option value="">Select Country</option>

                            <option value="sri-lanka">Sri Lanka</option>

                            <option value="india">India</option>

                            <option value="kuwait">Kuwait</option>

                            <option value="other">Other</option>

                        </select>

                    </p>

                    <p>

                        Gender:

                        <br><br>

                        <input
                            type="radio"
                            id="male"
                            name="gender"
                            value="male">

                        <label for="male">Male</label>

                        <br>

                        <input
                            type="radio"
                            id="female"
                            name="gender"
                            value="female">

                        <label for="female">Female</label>

                    </p>

                    <p>

                        Skills:

                        <br><br>

                        <input
                            type="checkbox"
                            id="html"
                            name="skills"
                            value="html">

                        <label for="html">HTML</label>

                        <br>

                        <input
                            type="checkbox"
                            id="css"
                            name="skills"
                            value="css">

                        <label for="css">CSS</label>

                        <br>

                        <input
                            type="checkbox"
                            id="javascript"
                            name="skills"
                            value="javascript">

                        <label for="javascript">JavaScript</label>

                    </p>

                    <p>

                        <label for="message">Message:</label>

                        <br>

                        <textarea
                            id="message"
                            name="message"
                            rows="6"
                            cols="40"
                            placeholder="Write your message here..."></textarea>

                    </p>

                </fieldset>

                <br>

                <input
                    type="submit"
                    value="Submit">

                <input
                    type="reset"
                    value="Reset">

                <button
                    type="button">

                    Click Me

                </button>

            </form>

        </section>

    </main>

    <hr>

    <footer>

        <p>

            &copy; 2026 My Portfolio. All rights reserved.

        </p>

    </footer>

</body>

</html>
