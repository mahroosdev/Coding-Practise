<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Colors</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>CSS Colors</h1>

    <p class="color-name">
        This text uses a color name.
    </p>

    <p class="hex-color">
        This text uses a HEX color value.
    </p>

    <p class="rgb-color">
        This text uses an RGB color value.
    </p>

    <p class="background-example">
        This paragraph has a background color.
    </p>

</body>

</html>
