<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Margins</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>CSS Margins</h1>

    <section class="small-margin">

        <h2>Small Margin</h2>

        <p>
            This section has a small margin around it.
        </p>

    </section>

    <section class="large-margin">

        <h2>Large Margin</h2>

        <p>
            This section has a larger margin around it.
        </p>

    </section>

    <section class="different-margins">

        <h2>Different Margins</h2>

        <p>
            This section uses different margin values on each side.
        </p>

    </section>

</body>

</html>
