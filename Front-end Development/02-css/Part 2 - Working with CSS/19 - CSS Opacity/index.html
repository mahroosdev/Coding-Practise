<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Opacity</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>CSS Opacity</h1>

    <section>

        <h2>Full Opacity</h2>

        <div class="full-opacity">

            <p>
                This box uses full opacity.
            </p>

        </div>

    </section>

    <section>

        <h2>Medium Opacity</h2>

        <div class="medium-opacity">

            <p>
                This box uses medium opacity.
            </p>

        </div>

    </section>

    <section>

        <h2>Low Opacity</h2>

        <div class="low-opacity">

            <p>
                This box uses low opacity.
            </p>

        </div>

    </section>

    <section>

        <h2>Background Opacity</h2>

        <div class="transparent-background">

            <p>
                This box uses a transparent background color.
            </p>

        </div>

    </section>

</body>

</html>
