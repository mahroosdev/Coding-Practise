<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Units</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>CSS Units</h1>

    <section>

        <h2>Pixels</h2>

        <div class="pixel-box">
            This box uses pixel values.
        </div>

    </section>

    <section>

        <h2>Percentage</h2>

        <div class="percentage-box">
            This box uses a percentage width.
        </div>

    </section>

    <section>

        <h2>EM Unit</h2>

        <div class="em-box">
            This text uses the em unit.
        </div>

    </section>

    <section>

        <h2>REM Unit</h2>

        <div class="rem-box">
            This text uses the rem unit.
        </div>

    </section>

    <section>

        <h2>Viewport Width</h2>

        <div class="viewport-box">
            This box uses the vw unit.
        </div>

    </section>

</body>

</html>
