<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Display</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>CSS Display</h1>

    <section>

        <h2>Block Elements</h2>

        <div class="block-box">Block Element 1</div>

        <div class="block-box">Block Element 2</div>

    </section>

    <section>

        <h2>Inline Elements</h2>

        <span class="inline-box">Inline Element 1</span>

        <span class="inline-box">Inline Element 2</span>

    </section>

    <section>

        <h2>Inline-Block Elements</h2>

        <span class="inline-block-box">Inline-Block 1</span>

        <span class="inline-block-box">Inline-Block 2</span>

    </section>

    <section>

        <h2>Hidden Element</h2>

        <p>
            The paragraph below is hidden using
            <strong>display: none</strong>.
        </p>

        <p class="hidden-text">
            This paragraph is hidden.
        </p>

    </section>

</body>

</html>
