<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Transitions</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>CSS Transitions</h1>

    <section>

        <h2>Background Color Transition</h2>

        <div class="color-box">
            Move the mouse over this box
        </div>

    </section>

    <section>

        <h2>Width Transition</h2>

        <div class="width-box">
            Hover to increase the width
        </div>

    </section>

    <section>

        <h2>Button Transition</h2>

        <button type="button" class="transition-button">
            Hover Over Me
        </button>

    </section>

    <section>

        <h2>Multiple Property Transition</h2>

        <div class="multiple-box">
            Hover to change several properties
        </div>

    </section>

</body>

</html>
