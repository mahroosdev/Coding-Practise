<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Animations</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>CSS Animations</h1>

    <section>

        <h2>Color Animation</h2>

        <div class="box color-box">
            Color Change
        </div>

    </section>

    <section>

        <h2>Moving Animation</h2>

        <div class="animation-area">

            <div class="box moving-box">
                Moving Box
            </div>

        </div>

    </section>

    <section>

        <h2>Rotating Animation</h2>

        <div class="box rotating-box">
            Rotate
        </div>

    </section>

    <section>

        <h2>Growing Animation</h2>

        <div class="box growing-box">
            Grow
        </div>

    </section>

    <section>

        <h2>Limited Animation</h2>

        <div class="box limited-box">
            Runs Three Times
        </div>

    </section>

</body>

</html>
