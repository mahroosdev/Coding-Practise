<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Pseudo-Classes</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>CSS Pseudo-Classes</h1>

    <section>

        <h2>Link Pseudo-Classes</h2>

        <a href="https://example.com" target="_blank" rel="noopener" class="website-link">
            Visit Example Website
        </a>

    </section>

    <section>

        <h2>Button Hover</h2>

        <button type="button" class="action-button">
            Move the Mouse Here
        </button>

    </section>

    <section>

        <h2>Input Focus</h2>

        <label for="username">Username</label>

        <input
            type="text"
            id="username"
            name="username"
            placeholder="Click inside this field">

    </section>

    <section>

        <h2>First Child</h2>

        <div class="paragraph-group">

            <p>First paragraph</p>

            <p>Second paragraph</p>

            <p>Third paragraph</p>

        </div>

    </section>

    <section>

        <h2>Last Child</h2>

        <ul class="item-list">

            <li>HTML</li>

            <li>CSS</li>

            <li>JavaScript</li>

        </ul>

    </section>

    <section>

        <h2>Nth Child</h2>

        <div class="number-list">

            <p>Item 1</p>

            <p>Item 2</p>

            <p>Item 3</p>

            <p>Item 4</p>

        </div>

    </section>

</body>

</html>
